
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Doom Loop Model</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

<style>
:root{
  --plot-h:220px;
}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#ffffff;
}
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 16px;
  border-bottom:1px solid #ddd;
  flex-wrap:wrap;
}
h1{
  margin:0;
  font-size:20px;
}
.toolbar{
  display:flex;
  gap:8px;
  align-items:center;
}
.btn{
  padding:8px 12px;
  border:1px solid #ccc;
  border-radius:10px;
  background:white;
  cursor:pointer;
  font-weight:bold;
}
.wrap{
  padding:10px;
  max-width:1600px;
  margin:0 auto;
}
.controls{
  display:grid;
  grid-template-columns:repeat(4,minmax(220px,1fr));
  gap:10px;
  margin-bottom:10px;
}
.control{
  background:#fafafa;
  border:1px solid #eee;
  border-radius:10px;
  padding:8px;
}
.control label{
  display:block;
  font-size:11px;
  font-weight:bold;
  margin-bottom:4px;
}
.control input{
  width:100%;
}
.val{
  font-size:11px;
  color:#444;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}
.plot{
  height:var(--plot-h);
}
@media(max-width:1200px){
  .grid{
    grid-template-columns:1fr 1fr;
  }
}
@media(max-width:800px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
<h1>Hospital Doom Loop Model</h1>

<div class="toolbar">
<button id="run" class="btn">▶ Run</button>
<button id="pause" class="btn" disabled>⏸ Pause</button>
<button id="reset" class="btn">⟲ Reset</button>
<div id="yearLabel"><strong>Year: 2000</strong></div>
</div>
</header>

<div class="wrap">

<div class="controls">

<div class="control">
<label>Baseline Elective Capacity</label>
<input id="baselineElectiveCapacity" type="range" min="50" max="600" step="1" value="267">
<div class="val" id="baselineElectiveCapacityVal">267</div>
</div>

<div class="control">
<label>Bed Capacity</label>
<input id="bedCapacity" type="range" min="1000" max="12000" step="100" value="5600">
<div class="val" id="bedCapacityVal">5600</div>
</div>

<div class="control">
<label>Baseline Emergency Admissions</label>
<input id="baselineEmergencyAdmissions" type="range" min="10" max="200" step="1" value="60">
<div class="val" id="baselineEmergencyAdmissionsVal">60</div>
</div>

<div class="control">
<label>Baseline Length Of Stay</label>
<input id="baselineLOS" type="range" min="5" max="60" step="0.1" value="23">
<div class="val" id="baselineLOSVal">23</div>
</div>

<div class="control">
<label>Complexity Sensitivity</label>
<input id="complexitySensitivity" type="range" min="0" max="2" step="0.01" value="0.35">
<div class="val" id="complexitySensitivityVal">0.35</div>
</div>

<div class="control">
<label>Safe Occupancy</label>
<input id="safeOccupancy" type="range" min="0.5" max="1" step="0.01" value="0.85">
<div class="val" id="safeOccupancyVal">0.85</div>
</div>

<div class="control">
<label>Covid Productivity Loss</label>
<input id="covidProductivityLoss" type="range" min="0" max="1" step="0.01" value="0">
<div class="val" id="covidProductivityLossVal">0</div>
</div>

<div class="control">
<label>Projection End Year</label>
<input id="endYear" type="range" min="2005" max="2050" step="1" value="2050">
<div class="val" id="endYearVal">2050</div>
</div>

</div>

<div class="grid">
<div id="bedsPlot" class="plot"></div>
<div id="waitPlot" class="plot"></div>
<div id="burnoutPlot" class="plot"></div>
<div id="losPlot" class="plot"></div>
<div id="occupancyPlot" class="plot"></div>
<div id="admissionsPlot" class="plot"></div>
</div>

</div>

<script>

(function(){

const $ = id => document.getElementById(id);

const sliders = [
"baselineElectiveCapacity",
"bedCapacity",
"baselineEmergencyAdmissions",
"baselineLOS",
"complexitySensitivity",
"safeOccupancy",
"covidProductivityLoss",
"endYear"
];

sliders.forEach(id=>{
  $(id).addEventListener("input",()=>{
    $(id+"Val").textContent=$(id).value;
  });
});

let animationTimer=null;
let frame=0;
let results=null;

function getParams(){

  return {

    BASELINE_ELECTIVE_CAPACITY:+$("baselineElectiveCapacity").value,
    BASELINE_ELECTIVE_WAIT:450,
    BASELINE_EMERGENCY_ADMISSIONS:+$("baselineEmergencyAdmissions").value,
    BASELINE_FINAL_DISCHARGE_DELAY:4,
    BASELINE_LENGTH_OF_STAY:+$("baselineLOS").value,
    BASELINE_REFERRALS:267,

    BED_CAPACITY:+$("bedCapacity").value,

    BURNOUT_BUILD_TIME:240,
    BURNOUT_IMPACT_ON_THROUGHPUT:0.6,
    BURNOUT_RECOVERY_TIME:540,

    COMPLEXITY_SENSITIVITY:+$("complexitySensitivity").value,

    CONGESTION_IMPACT_ON_THROUGHPUT:1,

    COVID_COMPLEXITY_INCREASE:0,
    COVID_PRODUCTIVITY_LOSS:+$("covidProductivityLoss").value,

    DOWNSTREAM_DELAY_SENSITIVITY:1.2,

    ELECTIVE_INPATIENT_FRACTION:0.35,
    ELECTIVE_SCHEDULING_TIME:30,

    INITIAL_ACUTE_INPATIENTS:3530,
    INITIAL_BURNOUT:0.2,
    INITIAL_DISCHARGE_READY_PATIENTS:613,
    INITIAL_ELECTIVE_WAITING_LIST:120000,

    LOS_SENSITIVITY_TO_OCCUPANCY:0.6,

    MINIMUM_THROUGHPUT_FRACTION:0.45,

    NORMAL_BURNOUT:0.2,

    OCCUPANCY_PRESSURE_WEIGHT:0.6,

    SAFE_OCCUPANCY:+$("safeOccupancy").value,

    SUSTAINABLE_PRESSURE:1,

    TIME_TO_RECOVER:1845,

    WAIT_PRESSURE_WEIGHT:0.4,

    TIME_STEP:1,

    END_YEAR:+$("endYear").value
  };
}

function simulate(){

  const p = getParams();

  const finalTime = (p.END_YEAR - 2000) * 365;

  let acuteInpatients = p.INITIAL_ACUTE_INPATIENTS;
  let dischargeReadyPatients = p.INITIAL_DISCHARGE_READY_PATIENTS;
  let burnout = p.INITIAL_BURNOUT;
  let electiveWaitingList = p.INITIAL_ELECTIVE_WAITING_LIST;

  let residualComplexityIncrease = p.COVID_COMPLEXITY_INCREASE;
  let residualProductivityLoss = p.COVID_PRODUCTIVITY_LOSS;

  let t=[];

  let occupiedBedsSeries=[];
  let waitSeries=[];
  let burnoutSeries=[];
  let losSeries=[];
  let occupancySeries=[];
  let admissionsSeries=[];

  for(let time=0; time<=finalTime; time+=p.TIME_STEP){

    const pandemicEffectOnComplexity =
      1 + residualComplexityIncrease;

    const pandemicEffectOnProductivity =
      1 - residualProductivityLoss;

    const electiveCapacity =
      p.BASELINE_ELECTIVE_CAPACITY *
      pandemicEffectOnProductivity;

    const electiveAdmissions =
      Math.min(
        electiveCapacity,
        electiveWaitingList /
        p.ELECTIVE_SCHEDULING_TIME
      );

    const inpatientElectiveAdmissions =
      electiveAdmissions *
      p.ELECTIVE_INPATIENT_FRACTION;

    const emergencyAdmissions =
      p.BASELINE_EMERGENCY_ADMISSIONS;

    const totalAdmissions =
      emergencyAdmissions +
      inpatientElectiveAdmissions;

    const occupiedBeds =
      acuteInpatients +
      dischargeReadyPatients;

    const occupancyPressure =
      occupiedBeds / p.BED_CAPACITY;

    const electiveWait =
      electiveWaitingList /
      Math.max(1e-6,electiveAdmissions);

    const electiveWaitRatio =
      electiveWait /
      p.BASELINE_ELECTIVE_WAIT;

    const occupancyEffectOnLOS =
      1 +
      p.LOS_SENSITIVITY_TO_OCCUPANCY *
      Math.max(
        0,
        (occupancyPressure - p.SAFE_OCCUPANCY) /
        p.SAFE_OCCUPANCY
      );

    const complexityEffectOnLOS =
      1 +
      p.COMPLEXITY_SENSITIVITY *
      Math.max(
        0,
        electiveWaitRatio - 1
      );

    const averageLOS =
      p.BASELINE_LENGTH_OF_STAY *
      complexityEffectOnLOS *
      occupancyEffectOnLOS *
      pandemicEffectOnComplexity;

    const dischargeReadiness =
      acuteInpatients /
      averageLOS;

    const downstreamDelayEffect =
      1 +
      p.DOWNSTREAM_DELAY_SENSITIVITY *
      Math.max(
        0,
        (occupancyPressure - p.SAFE_OCCUPANCY) /
        p.SAFE_OCCUPANCY
      );

    const finalDischargeDelay =
      p.BASELINE_FINAL_DISCHARGE_DELAY *
      downstreamDelayEffect;

    const finalDischarges =
      dischargeReadyPatients /
      finalDischargeDelay;

    const occupancyPressureEffect =
      p.OCCUPANCY_PRESSURE_WEIGHT *
      Math.max(
        0,
        occupancyPressure - p.SAFE_OCCUPANCY
      ) /
      p.SAFE_OCCUPANCY;

    const waitPressureEffect =
      p.WAIT_PRESSURE_WEIGHT *
      Math.max(
        0,
        electiveWaitRatio - 1
      );

    const pressureIndex =
      1 +
      occupancyPressureEffect +
      waitPressureEffect;

    const burnoutBuildup =
      Math.max(
        0,
        (pressureIndex - p.SUSTAINABLE_PRESSURE) *
        (1 - Math.min(1,burnout)) /
        p.BURNOUT_BUILD_TIME
      );

    const burnoutRecovery =
      Math.max(
        0,
        burnout - p.NORMAL_BURNOUT
      ) /
      p.BURNOUT_RECOVERY_TIME;

    const throughputEffectOfBurnout =
      Math.max(
        p.MINIMUM_THROUGHPUT_FRACTION,
        1 -
        p.BURNOUT_IMPACT_ON_THROUGHPUT *
        Math.max(
          0,
          burnout - p.NORMAL_BURNOUT
        )
      );

    const throughputEffectOfOccupancy =
      1 /
      (
        1 +
        p.CONGESTION_IMPACT_ON_THROUGHPUT *
        Math.max(
          0,
          occupancyPressure - p.SAFE_OCCUPANCY
        ) /
        p.SAFE_OCCUPANCY
      );

    const adjustedDischargeReadiness =
      dischargeReadiness *
      throughputEffectOfBurnout *
      throughputEffectOfOccupancy;

    const adjustedFinalDischarges =
      finalDischarges *
      throughputEffectOfBurnout *
      throughputEffectOfOccupancy;

    const complexityRecovery =
      residualComplexityIncrease /
      p.TIME_TO_RECOVER;

    const productivityRecovery =
      residualProductivityLoss /
      p.TIME_TO_RECOVER;

    acuteInpatients =
      acuteInpatients +
      (
        totalAdmissions -
        adjustedDischargeReadiness
      ) * p.TIME_STEP;

    dischargeReadyPatients =
      dischargeReadyPatients +
      (
        adjustedDischargeReadiness -
        adjustedFinalDischarges
      ) * p.TIME_STEP;

    burnout =
      burnout +
      (
        burnoutBuildup -
        burnoutRecovery
      ) * p.TIME_STEP;

    electiveWaitingList =
      electiveWaitingList +
      (
        p.BASELINE_REFERRALS -
        electiveAdmissions
      ) * p.TIME_STEP;

    residualComplexityIncrease =
      residualComplexityIncrease +
      (
        -complexityRecovery
      ) * p.TIME_STEP;

    residualProductivityLoss =
      residualProductivityLoss +
      (
        -productivityRecovery
      ) * p.TIME_STEP;

    t.push(2000 + time/365);

    occupiedBedsSeries.push(occupiedBeds);
    waitSeries.push(electiveWait);
    burnoutSeries.push(burnout);
    losSeries.push(averageLOS);
    occupancySeries.push(occupancyPressure);
    admissionsSeries.push(totalAdmissions);
  }

  return {
    t,
    occupiedBedsSeries,
    waitSeries,
    burnoutSeries,
    losSeries,
    occupancySeries,
    admissionsSeries
  };
}

function plotPartial(index){

  const r = results;

  const t = r.t.slice(0,index);

  function cut(arr){
    return arr.slice(0,index);
  }

  Plotly.react("bedsPlot", [{
    x:t,
    y:cut(r.occupiedBedsSeries),
    mode:"lines",
    line:{width:2}
  }], {
    title:"Occupied Beds",
    margin:{t:40,l:50,r:10,b:40}
  });

  Plotly.react("waitPlot", [{
    x:t,
    y:cut(r.waitSeries),
    mode:"lines",
    line:{width:2}
  }], {
    title:"Elective Wait Time",
    margin:{t:40,l:50,r:10,b:40}
  });

  Plotly.react("burnoutPlot", [{
    x:t,
    y:cut(r.burnoutSeries),
    mode:"lines",
    line:{width:2}
  }], {
    title:"Burnout",
    margin:{t:40,l:50,r:10,b:40}
  });

  Plotly.react("losPlot", [{
    x:t,
    y:cut(r.losSeries),
    mode:"lines",
    line:{width:2}
  }], {
    title:"Average Length Of Stay",
    margin:{t:40,l:50,r:10,b:40}
  });

  Plotly.react("occupancyPlot", [{
    x:t,
    y:cut(r.occupancySeries),
    mode:"lines",
    line:{width:2}
  }], {
    title:"Occupancy Pressure",
    margin:{t:40,l:50,r:10,b:40}
  });

  Plotly.react("admissionsPlot", [{
    x:t,
    y:cut(r.admissionsSeries),
    mode:"lines",
    line:{width:2}
  }], {
    title:"Total Admissions",
    margin:{t:40,l:50,r:10,b:40}
  });

  if(index>0){
    $("yearLabel").innerHTML =
      "<strong>Year: " +
      Math.floor(t[t.length-1]) +
      "</strong>";
  }
}

function run(){

  results = simulate();

  frame = 10;

  $("run").disabled=true;
  $("pause").disabled=false;

  if(animationTimer){
    clearInterval(animationTimer);
  }

  animationTimer = setInterval(()=>{

    frame += 30;

    if(frame >= results.t.length){

      frame = results.t.length;

      pause();
    }

    plotPartial(frame);

  },40);
}

function pause(){

  $("run").disabled=false;
  $("pause").disabled=true;

  clearInterval(animationTimer);
}

function reset(){

  pause();

  plotPartial(10);

  $("yearLabel").innerHTML =
    "<strong>Year: 2000</strong>";
}

$("run").addEventListener("click",run);
$("pause").addEventListener("click",pause);
$("reset").addEventListener("click",reset);

results = simulate();
plotPartial(10);

})();
</script>

</body>
</html>
